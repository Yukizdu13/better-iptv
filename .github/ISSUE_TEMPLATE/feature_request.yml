name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? (Optional)
      placeholder: I'm frustrated when...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: Add a button that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: I tried using... but it doesn't work well because...
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area does this feature belong to?
      options:
        - UI/UX
        - Playback
        - Playlist Management
        - EPG (Program Guide)
        - Performance
        - Settings/Configuration
        - Keyboard Shortcuts
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (Your Opinion)
      description: How important is this feature to you?
      options:
        - Nice to have
        - Would improve workflow
        - Important for my use case
        - Critical/Blocking
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Are there other apps that have implemented this feature well?
      placeholder: App X does this by...
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups/Sketches
      description: If applicable, add mockups or sketches to illustrate the feature
      placeholder: Drag and drop images here
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to help implement this?
      options:
        - label: I can help implement this feature (with guidance)
        - label: I can test this feature once implemented
