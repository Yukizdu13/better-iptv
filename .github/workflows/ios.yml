name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable + iOS target)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-ios
          cache: true

      - name: Cache Cargo (iOS)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-cargo-ios-

      - name: Install CocoaPods
        run: sudo gem install cocoapods --no-document

      - name: Install npm dependencies
        run: npm ci

      - name: Tauri iOS init
        run: npm run tauri ios init

      - name: Patch Info.plist (autoriser flux HTTP IPTV)
        run: bash scripts/ios-setup-macos.sh

      - name: Désactiver signature Xcode dans project.pbxproj
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, sys
          r = subprocess.run(['find', 'src-tauri/gen/apple', '-name', 'project.pbxproj'],
                             capture_output=True, text=True)
          pbx = r.stdout.strip()
          if not pbx:
              print("project.pbxproj non trouvé"); sys.exit(1)
          with open(pbx) as f: c = f.read()
          c = re.sub(r'DEVELOPMENT_TEAM = \w+;', 'DEVELOPMENT_TEAM = "";', c)
          c = re.sub(r'CODE_SIGN_IDENTITY = "[^"]*";', 'CODE_SIGN_IDENTITY = "";', c)
          c = c.replace('buildSettings = {',
              'buildSettings = {\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;')
          with open(pbx, 'w') as f: f.write(c)
          print(f"Patché: {pbx}")
          PYEOF

      - name: Build iOS (tauri ios build)
        run: npm run tauri ios build -- --target aarch64 2>&1 || true

      - name: Packager en .ipa
        run: |
          set -e
          # Chercher le .app dans le .xcarchive généré par tauri ios build
          APP=$(find src-tauri/gen/apple -name "*.xcarchive" \
            -exec find {} -name "*.app" -path "*/Products/Applications/*" \; \
            2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "xcarchive non trouvé, cherche dans les intermédiaires..."
            APP=$(find . -name "*.app" ! -path "*/Simulator*" ! -path "*/Pods*" \
              2>/dev/null | grep -i iphoneos | head -1)
          fi
          echo "App bundle: $APP"
          test -n "$APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qr BetterIPTV-unsigned.ipa Payload/
          rm -rf Payload/
          echo "IPA size: $(du -sh BetterIPTV-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BetterIPTV-iOS-${{ github.sha }}
          path: BetterIPTV-unsigned.ipa
          retention-days: 30
