# GitHub Labels Configuration
# Apply these labels manually through GitHub Settings > Labels
# Or use a tool like github-label-sync

# Type labels
- name: bug
  color: "d73a4a"
  description: Something isn't working

- name: enhancement
  color: "a2eeef"
  description: New feature or request

- name: documentation
  color: "0075ca"
  description: Improvements or additions to documentation

- name: question
  color: "d876e3"
  description: Further information is requested

# Priority labels
- name: priority:critical
  color: "b60205"
  description: Critical priority - needs immediate attention

- name: priority:high
  color: "d93f0b"
  description: High priority

- name: priority:medium
  color: "fbca04"
  description: Medium priority

- name: priority:low
  color: "0e8a16"
  description: Low priority

# Status labels
- name: needs-triage
  color: "ededed"
  description: Needs initial review and categorization

- name: needs-investigation
  color: "fbca04"
  description: Requires investigation to understand the issue

- name: in-progress
  color: "1d76db"
  description: Currently being worked on

- name: blocked
  color: "b60205"
  description: Blocked by another issue or external dependency

- name: stale
  color: "fef2c0"
  description: No recent activity

# Component labels
- name: frontend
  color: "bfdadc"
  description: React/TypeScript frontend

- name: backend
  color: "c2e0c6"
  description: Rust/Tauri backend

- name: ci
  color: "000000"
  description: Continuous Integration

- name: dependencies
  color: "0366d6"
  description: Dependency updates

# Area labels
- name: area:playback
  color: "c5def5"
  description: Video playback and MPV integration

- name: area:playlist
  color: "c5def5"
  description: Playlist management (M3U, Xtream)

- name: area:epg
  color: "c5def5"
  description: Electronic Program Guide

- name: area:ui
  color: "c5def5"
  description: User interface and design

- name: area:database
  color: "c5def5"
  description: SQLite database operations

# Platform labels
- name: platform:linux
  color: "f9d0c4"
  description: Linux specific

- name: platform:windows
  color: "f9d0c4"
  description: Windows specific

- name: platform:macos
  color: "f9d0c4"
  description: macOS specific

# Special labels
- name: good first issue
  color: "7057ff"
  description: Good for newcomers

- name: help wanted
  color: "008672"
  description: Extra attention is needed

- name: wontfix
  color: "ffffff"
  description: This will not be worked on

- name: duplicate
  color: "cfd3d7"
  description: This issue or pull request already exists

- name: security
  color: "d73a4a"
  description: Security related issue

- name: performance
  color: "fbca04"
  description: Performance improvement
