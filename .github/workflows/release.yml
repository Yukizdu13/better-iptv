name: Release Build

on:
  push:
    tags:
      - 'v*' # Triggers on version tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from GitHub UI

# Ensure only one release build runs at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-24.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Download MPV for Windows bundling
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          echo "📥 Downloading MPV Windows build..."
          MPV_VERSION="0.39.0"
          MPV_URL="https://sourceforge.net/projects/mpv-player-windows/files/64bit/mpv-x86_64-${MPV_VERSION}.7z/download"

          # Download MPV
          curl -L "$MPV_URL" -o mpv-windows.7z

          # Extract with 7z (pre-installed on Windows runners)
          7z x mpv-windows.7z -o"./resources-temp"

          # Find extracted folder and rename to 'mpv'
          mkdir -p resources
          mv ./resources-temp/mpv-x86_64-* ./resources/mpv

          # Verify
          ls -la ./resources/mpv/mpv.exe
          echo "✅ MPV bundled for Windows build"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Better IPTV ${{ github.ref_name }}'
          releaseBody: |
            ## What's Changed
            See the assets below to download Better IPTV for your platform.

            **Note:** Make sure MPV is installed on your system before running Better IPTV.

            ### Installation:
            - **Linux**: Download `.AppImage`, make executable, and run
            - **Windows**: Download `.msi` and install
            - **macOS**: Download `.dmg` and drag to Applications
          releaseDraft: true
          prerelease: false
          args: --verbose
